<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - RDWIS</title>
    <style>
        body {
            background-color: #0d0f14;
            color: #e8ecf4;
            font-family: "Source Sans Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            color: #4f8cff;
            margin-bottom: 10px;
        }
        p {
            color: #8b91a8;
            margin-top: 0;
        }
        .btn {
            background-color: #4f8cff;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background-color: #3b6ecc;
        }
    </style>
</head>
<body>
    <div>
        <h1>No Internet Connection</h1>
        <p>You are currently offline. Please check your network and try again.</p>
        <a href="/login" class="btn">Retry</a>
    </div>
</body>
</html>
